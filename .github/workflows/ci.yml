name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Print Env Secret
        run: echo "Deploying commit ${{ github.sha }}"

      - name: Stop existing PM2 processes
        run: pm2 stop all || true

      - name: Install backend dependencies
        run: npm install --prefix backend

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Run backend tests
        run: npm test --prefix backend
        continue-on-error: true
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: ${{ secrets.PORT }}

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Start backend with PM2
        run: |
          cd backend
          pm2 start "npm run start" --name="backend" || pm2 restart backend
          cd ..

      - name: Serve frontend with PM2
        run: |
          pm2 serve frontend/build 3000 --name "Frontend" --spa || pm2 restart Frontend

      - name: Save PM2 process list
        run: pm2 save

      - name: Show PM2 status
        run: pm2 status
